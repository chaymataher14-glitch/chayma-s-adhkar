    <style>
        :root { --bg: #1A1F1B; --card: #242B25; --accent: #A7C4A0; --accent2:#C9DFC3; --text: #f1f5f9; --muted:#94a3a8; }
        [data-cat="morning"][data-mode="night"] { --bg: #1A1F1B; --card: #242B25; --accent: #A7C4A0; --accent2:#C9DFC3; --text: #f1f5f9; --muted:#8ba38c; }
        [data-cat="morning"][data-mode="day"]   { --bg: #F2F5F2; --card: #FFFFFF; --accent: #5E7D5E; --accent2:#3f5a3f; --text: #1e293b; --muted:#64806a; }
        [data-cat="evening"][data-mode="night"] { --bg: #1F1B1B; --card: #2B2424; --accent: #D4A5A5; --accent2:#e6c3c3; --text: #f1f5f9; --muted:#a38b8b; }
        [data-cat="evening"][data-mode="day"]   { --bg: #F9F2F2; --card: #FFFFFF; --accent: #A66D6D; --accent2:#7d4c4c; --text: #1e293b; --muted:#8a6a6a; }
        [data-cat="sleep"][data-mode="night"]   { --bg: #161821; --card: #1F2230; --accent: #A5ADCE; --accent2:#c7ccdf; --text: #f1f5f9; --muted:#8790ab; }
        [data-cat="sleep"][data-mode="day"]     { --bg: #F2F3F9; --card: #FFFFFF; --accent: #5D6B9E; --accent2:#3f4a72; --text: #1e293b; --muted:#66719c; }

        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg); color: var(--text); transition: background-color 0.5s ease, color 0.5s ease; margin: 0; }
        .arabic-font { font-family: 'Amiri', serif; line-height: 2.3; font-size: 1.3rem; }
        .glass-card { background-color: var(--card); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
        .progress-ring { transition: stroke-dashoffset 0.4s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .sticky-nav { position: sticky; top: 0; z-index: 50; background-color: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 1rem; backdrop-filter: blur(6px); }
        .completion-bar { transition: width 0.8s ease; background-color: var(--accent); }
        .tab-btn { opacity: 0.4; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; border-bottom-color: var(--accent); color: var(--accent); }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 12px 24px; border-radius: 50px; z-index: 1000; animation: slideUp 3s forwards; }
        @keyframes slideUp { 0% {opacity:0; transform:translate(-50%,20px)} 15% {opacity:1; transform:translate(-50%,0)} 85% {opacity:1; transform:translate(-50%,0)} 100% {opacity:0; transform:translate(-50%,-10px)} }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .badge { font-size: 10px; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--accent); color: var(--accent); }
        .fade-in { animation: fadeIn .35s ease; }
        @keyframes fadeIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1; transform: translateY(0);} }
        .celeb-card { animation: celebIn .4s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes celebIn { from {opacity:0; transform: scale(0.94);} to {opacity:1; transform: scale(1);} }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; opacity: .5; }
    </style>

                {t: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ", c: 1, f: "دعاء يُختتم به اليوم، سائلًا الله خير الليلة ومتعوذًا من شرّها. (مسلم)"},
                {t: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ", c: 1, f: "سيد الاستغفار: من قالها حين يمسي موقنًا بها فمات من ليلته قبل أن يصبح دخل الجنة. (البخاري)"},
                {t: "اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ", c: 4, f: "ما من عبدٍ يقولها أربع مرات حين يمسي إلا أعتقه الله من النار. (أبو داود)"},
                {t: "اللَّهُمَّ مَا أَمْسَى بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ", c: 1, f: "من قالها حين يمسي فقد أدّى شكر ليلته. (أبو داود، ابن حبان)"},
                {t: "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ، وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ", c: 3, f: "دعاء جامع للعافية والاستعاذة من الكفر والفقر وعذاب القبر، يقال ثلاثًا مساءً وصباحًا."},
                {t: "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ", c: 7, f: "من قالها سبع مرات حين يمسي وحين يصبح كفاه الله ما أهمّه من أمر الدنيا والآخرة."},
                {t: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي", c: 1, f: "سؤال العفو والعافية الشاملة والحفظ من جميع الجهات."},
                {t: "اللَّهُمَّ عَالِمَ الْغَيْبِ وَالشَّهَادَةِ فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطَانِ وَشِرْكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءًا، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ", c: 1, f: "استعاذة من شر النفس ووسوسة الشيطان وشركه."},
                {t: "بِسْمِ اللهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ", c: 3, f: "من قالها ثلاث مرات حين يمسي لم تصبه فجأة بلاء حتى يصبح."},
                {t: "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا", c: 3, f: "من قالها ثلاثًا كان حقًّا على الله أن يُرضيه يوم القيامة."},
                {t: "أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ", c: 1, f: "إعلان الثبات على الفطرة والتوحيد عند المساء."},
                {t: "اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ", c: 1, f: "إقرار بالتوكل الكامل على الله في الحياة والموت والمصير."},
                {t: "سُبْحَانَ اللهِ وَبِحَمْدِهِ", c: 100, f: "من قالها مائة مرة حُطّت خطاياه وإن كانت مثل زَبَدِ البحر."},
                {t: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ", c: 100, f: "من قالها مائة مرة كانت له عدل عشر رقاب، وكُتبت له مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حِرزًا من الشيطان تلك الليلة."},
                {t: "أَسْتَغْفِرُ اللهَ وَأَتُوبُ إِلَيْهِ", c: 100, f: "ذكرٌ عام يُستحب الإكثار منه، اقتداءً باستغفار النبي ﷺ في اليوم أكثر من سبعين مرة."},
                {t: "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ", c: 10, f: "من صلّى عليه صلاةً واحدة صلّى الله عليه بها عشرًا."},
            ],
            sleep: [
                {t: `أعوذ بالله من الشيطان الرجيم: ${AYATUL_KURSI}`, c: 1, f: "من قرأها إذا أوى إلى فراشه لم يزل عليه من الله حافظ، ولا يقربه شيطان حتى يصبح. (البخاري، من قصة أبي هريرة مع حارس الزكاة)"},
                {t: "آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ، كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ، لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ، وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ. لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا، لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ، رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا، رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا، رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ، وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", c: 1, f: "آخر آيتين من سورة البقرة: من قرأهما في ليلة كفتاه. (البخاري، مسلم)"},
                {t: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ، فَإِنْ أَمْسَكْتَ نَفْسِي فَارْحَمْهَا، وَإِنْ أَرْسَلْتَهَا فَاحْفَظْهَا، بِمَا تَحْفَظُ بِهِ عِبَادَكَ الصَّالِحِينَ", c: 1, f: "دعاء عند وضع الجنب للنوم، يستودع فيه العبد نفسه لله سواء قبضها أو ردّها. (البخاري، مسلم)"},
                {t: "اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ", c: 3, f: "دعاء استعاذة من عذاب يوم القيامة عند النوم. (أبو داود، الترمذي - حسّنه بعض أهل العلم)"},
                {t: "بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا", c: 1, f: "يقال عند أخذ المضجع للنوم، وضدّه عند الاستيقاظ: الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور. (البخاري)"},
                {t: "سُبْحَانَ اللَّهِ", c: 33, f: "من تسبيح النوم الذي علّمه النبي ﷺ لفاطمة وعلي رضي الله عنهما حين شكيا إليه التعب من الطحن والخدمة، وقال لهما: هو خير لكما من خادم. تُقال: سبحان الله ٣٣، والحمد لله ٣٣، والله أكبر ٣٤. (البخاري، مسلم)"},
                {t: "الْحَمْدُ لِلَّهِ", c: 33, f: "الجزء الثاني من تسبيح فاطمة رضي الله عنها عند النوم، بعد سبحان الله وقبل الله أكبر. (البخاري، مسلم)"},
                {t: "اللَّهُ أَكْبَرُ", c: 34, f: "تُختم بها تسبيحة النوم (٣٣+٣٣+٣٤ = ١٠٠)، وهي خير من خادم يخدم الإنسان، كما أخبر النبي ﷺ ابنته فاطمة رضي الله عنها. (البخاري، مسلم)"},
                {t: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ غَضَبِهِ وَعِقَابِهِ، وَشَرِّ عِبَادِهِ، وَمِنْ هَمَزَاتِ الشَّيَاطِينِ وَأَنْ يَحْضُرُونِ", c: 1, f: "دعاء لمن أصابه فزع في نومه أو رأى ما يكره، كان النبي ﷺ يُعلّمه لمن يشكو الفزع في النوم. (أبو داود، الترمذي - حسن)"},
                {t: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ، وَضَلَعِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ", c: 1, f: "دعاء جامع كان النبي ﷺ يكثر منه، للاستعاذة من الهمّ والحزن والعجز والكسل والجبن والبخل وثقل الدَّين وقهر الرجال. (البخاري)"},
                {t: "اللَّهُمَّ خَلَقْتَ نَفْسِي وَأَنْتَ تَوَفَّاهَا، لَكَ مَمَاتُهَا وَمَحْيَاهَا، إِنْ أَحْيَيْتَهَا فَاحْفَظْهَا، وَإِنْ أَمَتَّهَا فَاغْفِرْ لَهَا. اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ", c: 1, f: "استسلام لأمر الله في الحياة والموت، وسؤال العافية. (مسلم)"},
                {t: "اللَّهُمَّ أَسْلَمْتُ نَفْسِي إِلَيْكَ، وَفَوَّضْتُ أَمْرِي إِلَيْكَ، وَوَجَّهْتُ وَجْهِي إِلَيْكَ، وَأَلْجَأْتُ ظَهْرِي إِلَيْكَ، رَغْبَةً وَرَهْبَةً إِلَيْكَ، لَا مَلْجَأَ وَلَا مَنْجَا مِنْكَ إِلَّا إِلَيْكَ، آمَنْتُ بِكِتَابِكَ الَّذِي أَنْزَلْتَ، وَبِنَبِيِّكَ الَّذِي أَرْسَلْتَ", c: 1, f: "دعاء الفطرة: من قاله ثم مات من ليلته مات على الفطرة. (البخاري، مسلم)"},
                {t: "قراءة سورة الإخلاص والمعوذتين، والمسح بهما على الوجه والجسد", c: 3, f: "كان النبي ﷺ إذا أوى إلى فراشه كل ليلة جمع كفّيه ونفث فيهما بعد قراءتهنّ ثلاثًا، ثم مسح بهما ما استطاع من جسده. (البخاري)"},
                {t: "قُلْ يَا أَيُّهَا الْكَافِرُونَ، لَا أَعْبُدُ مَا تَعْبُدُونَ، وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ، وَلَا أَنَا عَابِدٌ مَا عَبَدْتُّمْ، وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ، لَكُمْ دِينُكُمْ وَلِيَ دِينِ", c: 1, f: KAFIRUN_TIP + ". (أبو داود، الترمذي)"},
                {t: "اللَّهُمَّ رَبَّ السَّمَاوَاتِ السَّبْعِ وَرَبَّ الْعَرْشِ الْعَظِيمِ، رَبَّنَا وَرَبَّ كُلِّ شَيْءٍ، فَالِقَ الْحَبِّ وَالنَّوَى، وَمُنْزِلَ التَّوْرَاةِ وَالْإِنْجِيلِ وَالْفُرْقَانِ، أَعُوذُ بِكَ مِنْ شَرِّ كُلِّ ذِي شَرٍّ أَنْتَ آخِذٌ بِنَاصِيَتِهِ، أَنْتَ الْأَوَّلُ فَلَيْسَ قَبْلَكَ شَيْءٌ، وَأَنْتَ الْآخِرُ فَلَيْسَ بَعْدَكَ شَيْءٌ، وَأَنْتَ الظَّاهِرُ فَلَيْسَ فَوْقَكَ شَيْءٌ، وَأَنْتَ الْبَاطِنُ فَلَيْسَ دُونَكَ شَيْءٌ، اقْضِ عَنَّا الدَّيْنَ وَأَغْنِنَا مِنَ الْفَقْرِ", c: 1, f: "دعاء جامع علّمه النبي ﷺ لمن أراد قضاء الدَّين والغنى من الفقر. (مسلم)"},
                {t: "تلاوة سورة الملك كاملة: تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ...", c: 1, f: "سورة تشفع لصاحبها حتى يُغفر له، وهي المانعة من عذاب القبر. كان النبي ﷺ لا ينام حتى يقرأها. (الترمذي - حسن؛ وأصل المداومة عليها ثابت)"},
                {t: "تلاوة سورة السجدة كاملة: الم، تَنْزِيلُ الْكِتَابِ لَا رَيْبَ فِيهِ مِنْ رَبِّ الْعَالَمِينَ...", c: 1, f: "كان النبي ﷺ لا ينام حتى يقرأ سورتي السجدة والملك. (الترمذي، أبو داود، النسائي)"},
                {t: "أَسْتَغْفِرُ اللَّهَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْهِ", c: 3, f: "من قالها غُفرت ذنوبه وإن كان قد فرّ من الزحف. (أبو داود، الترمذي - حسن)"},
            ]
        };

        /* ================= UI ================= */

        const ZikrCard = React.forwardRef(({ zikr, id, isDone, onIncrement }, ref) => {
            const [local, setLocal] = useState(zikr.c);
            const [info, setInfo] = useState(false);
            useEffect(() => setLocal(isDone ? 0 : zikr.c), [isDone, zikr.c]);

            const radius = 18;
            const circum = 2 * Math.PI * radius;
            const offset = isDone ? 0 : circum - ((zikr.c - local) / zikr.c) * circum;

            const tap = () => {
                if (isDone || local <= 0) return;
                const next = local - 1;
                setLocal(next);
                if (next === 0) onIncrement(id);
            };

            return (
                <div
                    ref={ref}
                    onClick={tap}
                    className={`glass-card p-6 rounded-[30px] mb-4 cursor-pointer select-none transition-all duration-500 ${isDone ? 'opacity-10 scale-95 grayscale' : 'active:scale-98'}`}
                >
                    <div className="flex justify-between items-start gap-4">
                        <div className="relative w-12 h-12 flex-shrink-0 mt-2">
                            <svg className="w-full h-full">
                                <circle cx="24" cy="24" r={radius} fill="transparent" stroke="rgba(128,128,128,0.15)" strokeWidth="3" />
                                <circle cx="24" cy="24" r={radius} fill="transparent" stroke="var(--accent)" strokeWidth="3" strokeDasharray={circum} strokeDashoffset={offset} className="progress-ring" strokeLinecap="round" />
                            </svg>
                            <span className="absolute inset-0 flex items-center justify-center text-xs font-bold" style={{color: 'var(--accent)'}}>{isDone ? '✓' : local}</span>
                        </div>
                        <div className="text-right flex-1">
                            <p className="arabic-font mb-2">{zikr.t}</p>
                            <div className="flex items-center justify-between">
                                <span className="badge">{zikr.c > 1 ? `× ${zikr.c}` : 'مرة واحدة'}</span>
                                <button onClick={(e) => { e.stopPropagation(); setInfo(!info); }} className="text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100">
                                    {info ? 'إخفاء الفضل ↑' : 'فضل الذكر ↓'}
                                </button>
                            </div>
                        </div>
                    </div>
                    {info && <div className="mt-4 pt-4 border-t border-white/10 fade-in text-xs text-slate-400 italic leading-relaxed" style={{color: 'var(--muted)'}}>{zikr.f}</div>}
                </div>
            );
        });

        const App = () => {
            const [cat, setCat] = useState('morning');
            const [mode, setMode] = useState('night');
            const [progress, setProgress] = useState({ morning: {}, evening: {}, sleep: {} });
            const [resetEpoch, setResetEpoch] = useState({ morning: 0, evening: 0, sleep: 0 });
            const [streaks, setStreaks] = useState({ morning: {streak:0, best:0, lastDate:null}, evening: {streak:0, best:0, lastDate:null}, sleep: {streak:0, best:0, lastDate:null} });
            const [ready, setReady] = useState(false);
            const [toast, setToast] = useState(null);
            const [celeb, setCeleb] = useState(false);
            const [error, setError] = useState(null);
            const cardRefs = React.useRef({ morning: {}, evening: {}, sleep: {} });

            // Load persisted state on mount
            useEffect(() => {
                (async () => {
                    try {
                        const modeRes = await window.storage.get('adhkar-mode').catch(() => null);
                        if (modeRes) setMode(modeRes.value);
                    } catch (e) {}
                    try {
                        const progRes = await window.storage.get('adhkar-progress').catch(() => null);
                        if (progRes) {
                            const saved = JSON.parse(progRes.value);
                            if (saved.date === todayStr()) {
                                setProgress({ morning: saved.morning||{}, evening: saved.evening||{}, sleep: saved.sleep||{} });
                            }
                        }
                    } catch (e) {}
                    try {
                        const streakRes = await window.storage.get('adhkar-streaks').catch(() => null);
                        if (streakRes) setStreaks(JSON.parse(streakRes.value));
                    } catch (e) { setError('تعذّر تحميل بيانات سابقة، سنبدأ وردًا جديدًا.'); }
                    setReady(true);
                })();
            }, []);

            useEffect(() => {
                const root = document.documentElement;
                root.setAttribute('data-cat', cat);
                root.setAttribute('data-mode', mode);
            }, [cat, mode]);

            const persistProgress = useCallback(async (next) => {
                try {
                    await window.storage.set('adhkar-progress', JSON.stringify({ date: todayStr(), ...next }));
                } catch (e) {}
            }, []);

            const persistMode = useCallback(async (m) => {
                try { await window.storage.set('adhkar-mode', m); } catch (e) {}
            }, []);

            const persistStreaks = useCallback(async (s) => {
                try { await window.storage.set('adhkar-streaks', JSON.stringify(s)); } catch (e) {}
            }, []);

            const toggleMode = () => {
                const m = mode === 'night' ? 'day' : 'night';
                setMode(m); persistMode(m);
            };

            const percentage = useMemo(() => {
                const total = DATA[cat].length;
                const done = DATA[cat].filter((_, i) => progress[cat][i]).length;
                return total ? Math.round((done / total) * 100) : 0;
            }, [cat, progress]);

            const totalPercentage = useMemo(() => {
                let done = 0, total = 0;
                ['morning','evening','sleep'].forEach(c => {
                    total += DATA[c].length;
                    done += DATA[c].filter((_, i) => progress[c][i]).length;
                });
                return total ? Math.round((done / total) * 100) : 0;
            }, [progress]);

            useEffect(() => { if (percentage === 100) setCeleb(true); }, [percentage]);

            const handleIncrement = (i) => {
                setProgress(p => {
                    const next = { ...p, [cat]: { ...p[cat], [i]: true } };
                    persistProgress(next);
                    // streak update when this category hits 100%
                    const total = DATA[cat].length;
                    const doneCount = DATA[cat].filter((_, idx) => next[cat][idx]).length;
                    if (doneCount === total) {
                        setStreaks(s => {
                            const prev = s[cat];
                            const today = todayStr();
                            if (prev.lastDate === today) return s;
                            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                            const newStreak = prev.lastDate === yesterday ? prev.streak + 1 : 1;
                            const updated = { ...s, [cat]: { streak: newStreak, best: Math.max(newStreak, prev.best), lastDate: today } };
                            persistStreaks(updated);
                            return updated;
                        });
                    }
                    return next;
                });
                setToast(ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
                setTimeout(() => setToast(null), 3000);

                // Auto-advance: scroll the next not-yet-done card into view
                setTimeout(() => {
                    const list = DATA[cat];
                    let nextIndex = null;
                    for (let j = i + 1; j < list.length; j++) {
                        if (!progress[cat][j]) { nextIndex = j; break; }
                    }
                    const targetNode = nextIndex !== null ? cardRefs.current[cat][nextIndex] : null;
                    if (targetNode) {
                        targetNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 420);
            };

            const handleReset = () => {
                setProgress(p => {
                    const next = { ...p, [cat]: {} };
                    persistProgress(next);
                    return next;
                });
                setResetEpoch(r => ({ ...r, [cat]: r[cat] + 1 }));
                setCeleb(false);
            };

            if (!ready) {
                return <div className="min-h-screen flex items-center justify-center arabic-font text-lg opacity-60">جارٍ تحميل وردك...</div>;
            }

            return (
                <div className="min-h-screen">
                    <header className="sticky-nav">
                        <div className="max-w-2xl mx-auto">
                            <div className="flex justify-between items-center mb-3">
                                <button onClick={toggleMode} className="text-2xl leading-none" aria-label="تبديل الوضع الليلي والنهاري">{mode === 'night' ? '🌙' : '☀️'}</button>
                                <div className="text-center">
                                    <h1 className="text-lg font-bold tracking-[0.3em] uppercase">Shayma's Adhkar</h1>
                                    {streaks[cat].streak > 0 && <p className="text-[10px] mt-1" style={{color:'var(--accent)'}}>🔥 سلسلة {streaks[cat].streak} يوم (الأفضل: {streaks[cat].best})</p>}
                                </div>
                                <button onClick={handleReset} className="text-[10px] uppercase font-bold opacity-40">إعادة ↺</button>
                            </div>
                            <div className="h-1.5 w-full bg-black/10 rounded-full overflow-hidden">
                                <div className="h-full completion-bar" style={{ width: `${percentage}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-1 text-[9px] opacity-40">
                                <span>{percentage}% من هذا الورد</span>
                                <span>{totalPercentage}% من الورد اليومي كاملًا</span>
                            </div>
                        </div>
                    </header>
                    <div className="max-w-2xl mx-auto p-6">
                        <nav className="flex justify-center gap-10 mb-8 text-[11px] font-bold tracking-widest uppercase">
                            {['morning', 'evening', 'sleep'].map(t => (
                                <button key={t} onClick={() => setCat(t)} className={`tab-btn pb-2 ${cat === t ? 'active' : ''}`}>
                                    {t === 'morning' ? 'صباح' : t === 'evening' ? 'مساء' : 'نوم'}
                                </button>
                            ))}
                        </nav>
                        {error && <p className="text-center text-xs mb-4 opacity-50">{error}</p>}
                        <main className="space-y-4 pb-24">
                            {DATA[cat].map((z, i) => (
                                <ZikrCard key={`${cat}-${i}-${resetEpoch[cat]}`} id={i} zikr={z} isDone={!!progress[cat][i]} onIncrement={handleIncrement} ref={el => { cardRefs.current[cat][i] = el; }} />
                            ))}
                        </main>
                    </div>
                    {toast && <div className="toast-msg arabic-font text-sm">{toast}</div>}
                    {celeb && (
                        <div className="overlay" onClick={() => setCeleb(false)}>
                            <div className="p-10 glass-card celeb-card rounded-[40px] text-center max-w-xs border-none">
                                <div className="text-4xl mb-3">✓</div>
                                <h2 className="arabic-font text-2xl mb-3 text-white">
                                    أتممتِ ورد {cat === 'morning' ? 'الصباح' : cat === 'evening' ? 'المساء' : 'النوم'} كاملًا
                                </h2>
                                <p className="arabic-font text-base text-slate-300 opacity-70 mb-4">جزاك الله خيرًا ونفع بك</p>
                                {streaks[cat].streak > 1 && <p className="text-xs mb-4" style={{color:'var(--accent)'}}>🔥 سلسلة {streaks[cat].streak} يوم متتالية</p>}
                                <p className="text-[10px] opacity-40 leading-relaxed">سيتجدد هذا الورد تلقائيًا غدًا — لا حاجة لإعادته الآن.<br/>اضغط في أي مكان للإغلاق.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
