<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayma's Adhkar | أذكار شيماء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #F2F5F1; color: #3A4D39; transition: background 0.5s ease; }
        .arabic-font { font-family: 'Amiri', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AZKAR_DATA = [
            { id: 1, text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ", count: 1, category: "morning" },
            { id: 2, text: "سُبْحَانَ اللهِ وَبِحَمْدِهِ", count: 100, category: "morning" },
            { id: 3, text: "اللَّهُمَّ بِّكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ", count: 1, category: "morning" }
        ];

        const ZikrCard = ({ zikr }) => {
            const [current, setCurrent] = useState(zikr.count);
            const isDone = current === 0;

            const handleTap = () => {
                if (current > 0) {
                    setCurrent(prev => prev - 1);
                    if (window.navigator.vibrate) window.navigator.vibrate(10);
                }
            };

            const radius = 20;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - ( (zikr.count - current) / zikr.count) * circumference;

            return (
                <div 
                    onClick={handleTap}
                    className={`glass-card p-6 rounded-[32px] mb-4 cursor-pointer transition-all duration-500 transform active:scale-95 shadow-sm
                    ${isDone ? 'opacity-40 scale-95 border-green-200' : 'hover:shadow-md'}`}
                >
                    <div className="flex justify-between items-start gap-4">
                        <div className="relative w-12 h-12 flex-shrink-0">
                            <svg className="w-full h-full">
                                <circle cx="24" cy="24" r={radius} fill="transparent" stroke="#E2E8F0" strokeWidth="3" />
                                <circle 
                                    cx="24" cy="24" r={radius} fill="transparent" stroke={isDone ? "#4ADE80" : "#86A789"} 
                                    strokeWidth="3" strokeDasharray={circumference} strokeDashoffset={offset}
                                    className="progress-ring" strokeLinecap="round"
                                />
                            </svg>
                            <span className="absolute inset-0 flex items-center justify-center text-xs font-bold">
                                {isDone ? '✓' : current}
                            </span>
                        </div>
                        <p className="arabic-font text-xl leading-[2] text-right text-slate-800">{zikr.text}</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isWidget, setIsWidget] = useState(false);

            useEffect(() => {
                // Check if embedded via URL param or iframe detection
                const params = new URLSearchParams(window.location.search);
                if (params.get('view') === 'widget' || window.self !== window.top) {
                    setIsWidget(true);
                }

                // Send height to parent if embedded
                const sendHeight = () => {
                    const height = document.body.scrollHeight;
                    window.parent.postMessage({ type: 'resize', height }, '*');
                };
                sendHeight();
                window.addEventListener('resize', sendHeight);
            }, []);

            return (
                <div className={`max-w-xl mx-auto px-4 ${isWidget ? 'py-2' : 'py-12'}`}>
                    {!isWidget && (
                        <header className="text-center mb-12">
                            <h1 className="text-3xl font-light tracking-widest text-sage-800 mb-2">SHAYMA'S ADHKAR</h1>
                            <div className="h-px w-12 bg-slate-300 mx-auto mb-2"></div>
                            <p className="text-xs text-slate-400 uppercase tracking-tighter">Inner Peace & Remembrance</p>
                        </header>
                    )}

                    <main className="space-y-4">
                        {AZKAR_DATA.map(z => <ZikrCard key={z.id} zikr={z} />)}
                    </main>

                    {!isWidget && (
                        <footer className="mt-12 text-center text-xs text-slate-400">
                            Designed for focus and tranquility.
                        </footer>
                    )}
                </div>
            );
        };
